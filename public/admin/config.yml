# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: fblaze62/blog
  branch: main
  base_url: https://auth.fblaze62.top/

locale: zh_CN

media_folder: /public/assets/images
public_folder: /assets/images

asset_collections:
  - name: post-images
    label: 文章配图
    icon: post_add
    media_folder: /src/content/posts/images
    public_folder: /images
  - name: dynamic-images
    label: 动态配图
    icon: forum
    media_folder: /src/content/dynamic/images
    public_folder: /images
  - name: assets
    label: 站点资源
    icon: folder_open
    media_folder: /public/assets
    public_folder: /assets
  - name: images
    label: 站点图片
    icon: image
    media_folder: /src/assets/images
    public_folder: /assets/images

collections:
  - name: posts
    label: 📝 博客文章
    folder: /content/posts
    path: src/content/posts
    media_folder: /content/posts/images
    public_folder: /images
    create: true
    format: yaml-frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields:
      fields: [title, published, tags, category, draft, pinned]
      default:
        field: published
        direction: descending
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布时间, name: published, widget: datetime, type: datetime, format: yyyy-MM-dd, pattern: true }
      - { label: 更新时间, name: updated, widget: datetime, type: datetime, format: yyyy-MM-dd, pattern: true }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 文章摘要, name: description, widget: string }
      - { label: 封面图, name: image, widget: image }
      - { label: 标签, name: tags, widget: string }
      - { label: 分类, name: category, widget: string }
      - { label: 语言, name: lang, widget: select, options: { values: [{ label: 中文, value: "" }, { label: English, value: en }, { label: 日本語, value: ja }, { label: 繁體中文, value: zh_TW }, { label: Русский, value: ru }] } }
      - { label: 置顶, name: pinned, widget: boolean, default: false }
      - { label: 作者, name: author, widget: string }
      - { label: 原文链接, name: sourceLink, widget: string }
      - { label: 许可协议名称, name: licenseName, widget: string }
      - { label: 许可协议链接, name: licenseUrl, widget: string }
      - { label: 启用评论, name: comment, widget: boolean, default: true }
      - { label: 文章密码, name: password, widget: string }
      - { label: 密码提示, name: passwordHint, widget: string }
      - { label: 正文, name: body, widget: richtext, required: true }
  - name: dynamic
    label: 📓 个人动态
    folder: /content/dynamic
    path: src/content/dynamic
    media_folder: /content/dynamic/images
    public_folder: /images
    create: true
    format: yaml-frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields:
      fields: [published]
      default:
        field: published
        direction: descending
    fields:
      - { label: 发布时间, name: published, widget: datetime, type: datetime, format: yyyy-MM-dd HH:mm:ss, pattern: true }
      - { label: 正文, name: body, widget: richtext, required: true }
  - name: pages
    label: 📄 页面
    files:
      - name: about
        label: 📄 关于页面
        file: src/content/spec/about.md
        format: yaml-frontmatter
        fields:
          - { label: 页面标题, name: title, widget: string, default: "关于我" }
          - { label: 正文, name: body, widget: richtext }
      - name: friends
        label: 🔗 友情链接
        file: src/content/spec/friends.mdx
        format: yaml-frontmatter
        fields:
          - { label: 页面标题, name: title, widget: string, default: "友情链接" }
          - { label: 页面描述, name: description, widget: string }
          - { label: 正文, name: body, widget: richtext, format: mdx }
      - name: guestbook
        label: 📝 留言板
        file: src/content/spec/guestbook.md
        format: yaml-frontmatter
        fields:
          - { label: 页面标题, name: title, widget: string, default: "留言板" }
          - { label: 正文, name: body, widget: richtext }
  - name: site-settings
    label: ⚙️ 站点设置
    files:
      - name: site-config
        label: 🌐 站点主配置
        file: src/config/siteConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: profile-config
        label: 👤 个人信息
        file: src/config/profileConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: announcement-config
        label: 📢 公告栏
        file: src/config/announcementConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: license-config
        label: 📜 许可协议
        file: src/config/licenseConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
  - name: layout-appearance
    label: 🎨 布局与外观
    files:
      - name: nav-bar-config
        label: 🧭 导航栏
        file: src/config/navBarConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: sidebar-config
        label: 📐 侧边栏布局
        file: src/config/sidebarConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: footer-config
        label: 📏 页脚设置
        file: src/config/footerConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: footer-html
        label: 📏 页脚 HTML
        file: src/config/FooterConfig.html
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: font-config
        label: 🔤 字体设置
        file: src/config/fontConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: cover-image-config
        label: 🖼️ 文章封面图
        file: src/config/coverImageConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: background-wallpaper
        label: 🏞️ 背景壁纸
        file: src/config/backgroundWallpaper.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: expressive-code-config
        label: 💻 代码块样式
        file: src/config/expressiveCodeConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
  - name: feature-settings
    label: 🔧 功能配置
    files:
      - name: comment-config
        label: 💬 评论系统
        file: src/config/commentConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: analytics-config
        label: 📊 数据统计
        file: src/config/analyticsConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: music-config
        label: 🎵 音乐播放器
        file: src/config/musicConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: sponsor-config
        label: 💰 打赏页面
        file: src/config/sponsorConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: friends-data
        label: 🔗 友链数据
        file: src/config/friendsConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: effects-config
        label: 🌸 樱花特效
        file: src/config/effectsConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: gallery-config
        label: 🖼️ 相册配置
        file: src/config/galleryConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: dynamic-config
        label: 📓 动态配置
        file: src/config/dynamicConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: pio-config
        label: 🎭 看板娘
        file: src/config/pioConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: plantuml-config
        label: 📐 PlantUML 图表
        file: src/config/plantumlConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: mermaid-config
        label: 📐 Mermaid 图表
        file: src/config/mermaidConfig.ts
        fields:
          - { label: 配置, name: body, widget: code, required: true }
  - name: cms-settings
    label: ✏️ CMS 配置
    files:
      - name: sveltia-cms
        label: Sveltia CMS
        file: public/admin/config.yml
        fields:
          - { label: 配置, name: body, widget: code, required: true }
      - name: pages-cms
        label: Pages CMS
        file: /.pages.yml
        fields:
          - { label: 配置, name: body, widget: code, required: true }