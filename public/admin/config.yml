# 后台系统配置
backend:
    name: github
    repo: fblaze62/blog # 请替换为您的 GitHub 仓库
    branch: main # 请替换为您的分支名称
    site_domain: blog.fblaze62.top # 请替换为您的域名
    base_url: https://blog.fblaze62.top  # 请替换为您的 URL
    auth_endpoint: oauth # OAuth 路由由集成提供


# 设置后台系统语言 (zh_Hans 简体中文 | en 英文 | ...)
locale: zh_Hans


# 媒体目录配置
media_folder: "src/assets/images" # 媒体文件存储路径
public_folder: "assets/images" # 公共访问路径


# 内容管理配置
collections:

    - # 文章
        # 集合名称
        name: "posts"
        # 后台显示标签
        label: "Posts"
        # 内容存储目录
        folder: "src/content/posts"
        # 目录嵌套配置
        meta:
            # 路径配置
            path:
                # 后台显示标签
                label: "Path"
                # 记录路径的部件
                widget: hidden # 隐藏
                # 索引文件名称（用于嵌套集合）
                index_file: "_index"
        nested:
            # 最大嵌套深度
            depth: 10
            # 摘要模板，用于树状菜单中文件夹的显示名称
            summary: '{{dirname}}'
            # 是否支持子文件夹
            subfolders: false # 由于文章是独立的 .md 文件，需要设为 false 以防止 CMS 寻找文件夹下的 _index.md
        ## 列表页分组配置
        #view_groups:
        #    - # 按文件夹分组
        #        # 分组标签
        #        label: "Folder"
        #        # 分组依据的字段
        #        field: "path"
        #        # 分组匹配模式
        #        pattern: '^([^/]+)/' # 匹配第一个路径段（即文件夹名）
        # 允许创建新条目
        create: true
        # 文件命名规则
        slug: "{{slug}}"
        # 集合特定的媒体文件夹配置
        media_folder: "" # 留空表示使用相对路径
        public_folder: "" # 留空表示使用相对路径
        # 字段列表
        fields:
            - # 标题
                { name: "title", label: "Title", widget: "string" }
            - # 发布日期
                { name: "published", label: "Published Date", widget: "datetime", required: false }
            - # 更新日期
                { name: "updated", label: "Updated Date", widget: "datetime", required: false }
            - # 描述
                { name: "description", label: "Description", widget: "text", required: false }
            - # 封面图
                { name: "cover", label: "Cover", widget: "image", required: false }
            - # 标签
                { name: "tags", label: "Tags", widget: "list", default: [], required: false }
            - # 分类
                { name: "category", label: "Category", widget: "string", required: false }
            - # 草稿
                { name: "draft", label: "Draft", widget: "boolean", default: false }
            - # 正文
                { name: "body", label: "Body", widget: "markdown" }

